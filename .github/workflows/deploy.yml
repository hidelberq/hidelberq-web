name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare Workers
        run: bun wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Record deploy activity
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          PAYLOAD=$(jq -n \
            --arg msg "$COMMIT_MSG" \
            --arg hash "$COMMIT_HASH" \
            '{type: "deploy", message: $msg, metadata: ({hash: $hash} | tostring)}')
          curl -sf -X POST "https://hidelberq.com/api/activity" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ACTIVITY_API_KEY" \
            -d "$PAYLOAD" || echo "Failed to record deploy activity (non-critical)"
        env:
          ACTIVITY_API_KEY: ${{ secrets.ACTIVITY_API_KEY }}
